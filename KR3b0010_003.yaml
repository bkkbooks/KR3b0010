body:
  text: 李衛公問對卷下太宗曰嚴刑峻法使人畏我而不畏敵朕甚惑之昔光武以孤軍當王莽百萬之衆非有刑法臨之此何由乎靖曰兵家勝敗情狀萬殊不可以一事推也如陳勝吳廣敗秦師豈勝廣刑法能加於秦乎光武之起蓋順人心之怨莽也况又王尋王邑不曉兵法徒誇兵衆所以自敗臣按孫子曰卒未親附而罰之則不服已親附而罰不行則不可用此言凡將先有愛結於士然後可以嚴刑也若愛未加而獨用峻法鮮克濟焉太宗曰尚書云威克厥愛允濟愛克厥威允罔功何謂也靖曰愛設於先威設於後不可反是也若威加於前愛救於後無益於事矣尚書所以慎戒其終非所以作謀於始也故孫子之法萬代不刋太宗曰卿平蕭銑諸將皆欲籍僞臣家以賞士卒卿獨不從以為蒯通不戮于漢既而江漢歸順朕由是思古人有言曰文能附衆武能威敵其卿之謂乎靖曰漢光武平赤眉入賊營中按行賊曰蕭王推赤心於人腹中此蓋先料人情本非為惡豈不豫慮哉臣頃討突厥總畨漢之衆出塞千里未嘗戮一揚干斬一莊賈亦推赤誠存至公而已矣陛下過聽擢臣以不次之位若於文武則何敢當太宗曰昔唐儉使突厥卿因擊而敗之人言卿以儉為死間朕至今疑焉如何靖再拜曰臣與儉比肩事主料儉說必不能柔服故臣因縱兵擊之所以去大患不顧小義也人謂以儉為死間非臣之心按孫子用間最為下策臣嘗著論其末云水能載舟亦能覆舟或用間以成功或憑間以傾敗若束髮事君當朝正色忠以盡節信以竭誠雖有善間安可用乎唐儉小義陛下何疑太宗曰誠哉非仁義不能使間此豈纖人所為乎周公大義滅親况一使人乎灼然無疑矣太宗曰兵貴為主不貴為客貴速不貴久何也靖曰兵不得已而用之安在為客且久哉孫子曰逺輸則百姓貧此為客之弊也又曰役不冉籍糧不三載此不可久之驗也臣較量主客之勢則有變客為主變主為客之術太宗曰何謂也靖曰因糧於敵是變客為主也飽能饑之佚能勞之是變主為客也故兵不拘主客遲速惟發必中節所以為宜太宗曰古人有諸靖曰昔越伐吳以左右二軍鳴鼓而進吳分兵禦之越以中軍潛涉不鼓襲敗吳師此變客為主之驗也石勒與姬淡戰淡兵逺來勒遣孔萇為前鋒逆擊淡軍孔萇退而淡來追勒以伏兵夾擊之淡軍大敗此變勞為佚之驗也古人如此者多太宗曰鐵蒺藜行馬太公所制是乎靖曰有之然拒敵而已兵貴致人非欲拒之也太公六韜言守禦之具爾非攻戰所施也太宗曰太公云以步兵與車騎戰者必依丘墓險阻又孫子曰天隙之地丘墓故城兵不可處如何靖曰用衆在乎心一心一在乎禁祥去疑儻主將有所疑忌則羣情搖羣情搖則敵乘釁而至矣安營據地便乎人事而已若澗井陷隙之地及如牢如羅之處人事不便者也故兵家引而避之防敵乘我丘墓故城非絶險處我得之為利豈宜反去之乎太公所說兵之至要也太宗曰朕思凶器無甚於兵者行兵茍便於人事豈以避忌為疑今後諸將有以隂陽拘忌失於事宜者卿當丁寧誡之靖再拜謝曰臣按尉繚子云黃帝以德守之以刑伐之是謂刑德非天官時日之謂也然詭道可使由之不可使知之後世庸將泥于術數是以多敗不可不誡也陛下聖訓臣宜宣告諸將太宗曰兵有分有聚各貴適宜前代事跡孰為善此者靖曰苻堅總百萬之衆而敗於淝水此兵能合而不能分之所致也吳漢討公孫述與副將劉尚分屯相去二十里述來攻漢尚出合擊大破之此兵分而能合之所致也太公曰分不分為縻軍聚不聚為孤旅太宗曰然苻堅初得王猛實知兵遂取中原及猛卒堅果敗此縻軍之謂乎吳漢為光武所任兵不遙制故漢果平蜀此不陷孤旅之謂乎得失事迹足為萬代鑒太宗曰朕觀千章萬句不出乎多方以誤之一句而已靖良久曰誠如聖語大凡用兵若敵人不誤則我師安能克哉譬如奕棋兩敵均焉一著或失竟莫能救是古今勝敗率由一誤而已况多失者乎太宗曰攻守二事其實一法歟孫子言善攻者敵不知其所守善守者敵不知其所攻即不言敵來攻我我亦攻之我若自守敵亦守之攻守兩齊其術奈何靖曰前代似此相攻相守者多矣皆曰守則不足攻則有餘便謂不足為弱有餘為强蓋不悟攻守之法也臣按孫子云不可勝者守也可勝者攻也謂敵未可勝則我且自守待敵可勝則攻之爾非以强弱為辭也後人不曉其義則當攻而守當守而攻二役既殊故不能一其法太宗曰信乎有餘不足使後人惑其强弱殊不知守之法要在示敵以不足攻之法要在示敵以有餘也示敵以不足則敵必來攻此是敵不知其所攻者也示敵以有餘則敵必自守此是敵不知其所守者也攻守一法敵與我分而為二事若我事得則敵事敗敵事得則我事敗得失成敗彼我之事分焉攻守者一而已矣得一者百戰百勝故曰知彼知己百戰不殆其知一之謂乎靖再拜曰深乎聖人之法也攻是守之機守是攻之策同歸乎勝而已矣若攻不知守守不知攻不惟二其事抑又二其官雖口誦孫吳而心不思妙攻守兩齊之說其孰能知其然乎太宗曰司馬法言國雖大好戰必亡天下雖安忘戰必危此亦攻守一道乎靖曰有國有家者曷嘗不講乎攻守也夫攻者不止攻其城擊其陳而已必有攻其心之術焉守者不止完其壁堅其陳而已必也守吾氣以有待焉大而言之為君之道小而言之為將之法夫攻其心者所謂知彼者也守吾氣者所謂知己者也太宗曰誠哉朕嘗臨陳先料敵之心與己之心孰審然後彼可得而知焉察敵之氣與己之氣孰治然後我可得而知焉是以知彼知己兵家大要今之將臣雖未知彼苟能知己則安有失利者哉靖曰孫武所謂先為不可勝者知己者也以待敵之可勝者知彼者也又曰不可勝在己可勝在敵臣斯須不敢失此誡太宗曰孫子言三軍可奪氣之法朝氣鋭晝氣惰暮氣歸善用兵者避其鋭氣擊其惰歸如何靖曰夫含生稟血鼓作鬬爭雖死不省者氣使然也故用兵之法必先察吾士衆激吾勝氣乃可以擊敵焉吳起四機以氣機為上無他道也能使人人自鬬則其鋭莫當所謂朝氣鋭者非限時刻而言也舉一日始末為喻也凡三鼓而敵不衰不竭則安能必使之惰歸哉蓋學者徒誦空文而為敵所誘茍悟奪之之理則兵可任矣太宗曰卿嘗言李績能兵法久可用否然非朕控御則不可用也他日太子治若何御之靖曰為陛下計莫若黜績令太子復用之則必感恩圖報于理何損乎太宗曰善朕無疑矣太宗曰李世績若與長孫無忌共掌國政他日如何靖曰績忠義臣可保任也無忌佐命大功陛下以肺腑之親委之輔相然外貌下士內實嫉賢故尉遲敬德面折其短遂引退焉侯君集恨其忘舊因以犯逆皆無忌致其然也陛下詢及臣臣不敢避其說太宗曰勿泄也朕徐思其處置太宗曰漢髙帝能將將其後韓彭見誅蕭何下獄何故如此靖曰臣觀劉項皆非將將之君當秦之亡也張良本為韓報讐陳平韓信皆怨楚不用故假漢之勢自為奮爾至于蕭曹樊灌悉由亡命髙祖因之以得天下設使六國之後復立人人各懷其舊則雖有能將將之才豈為漢用哉臣謂漢得天下由張良借筯之謀蕭何漕挽之功也以此言之韓彭見誅范增不用其事同也臣故謂劉項皆非將將之君太宗曰光武中興能保全功臣不任以吏事此則善于將將乎靖曰光武雖藉前搆易于成功然莽勢不下于項籍鄧冦未越于蕭曹獨能推赤心用柔治保全功臣賢于髙祖逺矣以此論將將之道臣謂光武得之太宗曰古者出師命將齊三日授之以鉞曰從此至天將軍制之又授之以斧曰從此至地將軍制之又推其轂曰進退惟時既行軍中但聞將軍之令不聞君命朕謂此禮久廢今欲與卿參定遣將之儀如何靖曰臣竊謂聖人制作致齊於廟者所以假威於神也授斧鉞又推其轂者所以委寄以權也今陛下每有出師必與公卿議論告廟而後遣此則邀以神至矣每有任將必使之便宜從事此則假以權重矣何異于致齊推轂耶盡合古禮其義同焉不須參定上曰善乃命近臣書此二事為後世法太宗曰隂陽術數廢之可乎靖曰不可兵者詭道也託之以隂陽術數則使貪使愚兹不可廢也太宗曰卿嘗言天官時日明將不法暗將拘之廢亦宜然靖曰紂以甲子日亡武王以甲子日興天官時日甲子一也殷亂周治興亡異焉又宋武帝以往亡日起兵軍吏以為不可帝曰我往彼亡果克之由此言之可廢明矣然而田單為燕所圍單命一人為神拜而祠之神言燕可破單于是以火牛出擊燕大破之此是兵家詭道天官時日亦猶此也太宗曰田單託神怪而破燕大公焚蓍龜而滅紂二事相反何也靖曰其機一也或逆而取之或順而行之是也昔太公佐武王至牧野遇雷雨旗鼓毁折散宜生欲卜吉而後行此則因軍中疑懼必假卜以問神焉太公以為腐草枯骨無足問且以臣伐君豈可再乎然觀散宜生發機于前太公成機于後逆順雖異其理致則同臣前所謂術數不可廢者蓋存其機于未萌也及其成功在人事而已太宗曰當今將帥惟李績道宗薛萬徹除道宗以親屬外孰堪大用靖曰陛下嘗言績道宗用兵不大勝亦不大敗萬徹若不大勝即須大敗臣愚思聖言不求大勝亦不大敗者節制之兵也或大勝或大敗者幸而成功者也故孫武云善戰者立于不敗之地而不失敵之敗也節制在我云爾太宗曰兩陳相臨欲言不戰安可得乎靖曰昔晉師伐秦交綏而退司馬法曰逐奔不逺縱綏不及臣謂綏者御轡之索也我兵既有節制彼敵亦正行伍豈敢輕戰哉故有出而交綏退而不逐各防其失敗者也孫武云勿擊堂堂之陳勿邀正正之旗若兩陳體均勢等茍一輕肆為其所乘則或大敗理使然也是故兵有不戰有必戰夫不戰者在我必戰者在敵太宗曰不戰在我何謂也靖曰孫武云我不欲戰者畫地而守之敵不得與我戰者乖其所之也敵有人焉則交綏之間未可圖也故曰不戰在我夫必戰在敵者孫武云善動敵者形之敵必從之豫之敵必取之以利動之以本待之敵無人焉則必來戰我得以乘而破之故曰必戰者在敵太宗曰深乎節制之師得其法則昌失其法則亡卿為纂述厯代善于節制者具圖來上朕當擇其精微垂于後世靖曰臣前進黃帝太公二陳圖并司馬法諸葛亮竒正之法此已精悉厯代名將用其一二成功者亦衆矣但史官鮮克知兵不能紀其實跡焉臣敢不奉詔當纂述以聞太宗曰兵法孰為最深者靖曰臣嘗分三等使學者當漸而至焉一曰道二曰天地三曰將法夫道之說至精至微易所謂聰明睿智神武而不殺者是也夫天之說隂陽地之說險易善用兵者能以隂奪陽以險攻易孟子所謂天時地利者是也夫將法之說在乎任人利器三略所謂得士者昌管仲所謂器必堅利者是也太宗曰然吾謂不戰而屈人之兵者上也百戰百勝者中也深溝髙壘以自守者下也以是較量孫武著書三等皆具焉靖曰觀其文迹其事亦可差别矣若張良范蠡孫武脫然髙引不知所往此非知道安能爾乎若樂毅管仲諸葛亮戰必勝守必固此非察天時地利安能爾乎其次王猛之保秦謝安之守晉非任將擇才繕完自固安能爾乎故習兵之學必先由下以及中由中以及上則漸而深矣不然則垂空言徒記誦無足取也太宗曰道家忌三世為將者不可妄傳也亦不可不傳也卿其慎之靖再拜出盡傳其書與李績李衛公問對卷下
