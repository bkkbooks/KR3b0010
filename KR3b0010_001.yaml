  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0010_WYG_001-1a, image: WYG0726/WYG0726-0144c.png}
body:
  text: 李衛公問對卷上太宗曰髙麗數侵新羅朕遣使諭不奉詔將討之如何靖曰探知葢蘇文自恃知兵謂中國無能討故違命臣請師三萬擒之太宗曰兵少地遙以何術臨之靖曰臣以正兵太宗曰平突厥時用竒兵今言正兵何也靖曰諸葛亮七擒孟獲無他道也正兵而已矣太宗曰晉馬隆討凉州亦是依八陣圖作偏箱車地廣則用鹿角車營路狹則為木屋施於車上且戰且前信乎正兵古人所重也靖曰臣討突厥西行數千里若非正兵安能致逺偏箱鹿角兵之大要一則治力一則前拒一則束部伍三者迭相為用斯馬隆所得古法深也太宗曰朕破宋老生初交鋒義師少却朕親以鐵騎自南原馳下横突之老生兵㫁後大潰遂擒之此正兵乎竒兵乎靖曰陛下天縱神武非學而能臣按兵法自黄帝以来先正而後竒先仁義而後權譎且霍邑之戰師以義舉者正也建成墜馬右軍少却者奇也太宗曰彼時少却幾敗大事曷謂奇耶靖曰凡兵以前向為正後却為奇且右軍不却則老生安致之来哉法曰利而誘之亂而取之老生不知兵恃勇急進不意斷後見擒于陛下此所謂以奇為正也太宗曰霍去病暗與孫呉合誠有是夫當右軍之却也髙祖失色及朕奮擊反為我利孫呉暗合卿實知言太宗曰凡兵却皆謂之奇乎靖曰不然夫兵却旗參差而不齊鼓大小而不應令喧囂而不一此真敗者也非奇也若旗齊鼓應號令如一紛紛紜紜雖退走非敗也必有奇也法曰佯北勿追又曰能而示之勿能皆奇之謂也太宗曰霍邑之戰右軍少却其天乎老生被擒其人乎靖曰若非正兵變為奇竒兵變為正則安能勝哉故善用兵者奇正在人而已變而神之所以推乎天也太宗俛首太宗曰竒正素分之歟臨時制之歟靖曰按曹公新書曰已二而敵一則一術為正一術為奇已五而敵一則三術為正二術為竒此言大畧耳惟孫武云戰勢不過竒正竒正之變不可勝窮奇正相生如循環之無端孰能窮之斯得之矣安有素分之耶若士卒未習吾法偏裨未熟吾令則必為之二術敎戰時各認旗鼓迭相分合故曰分合為變此敎戰之術耳敎閲既成衆知吾法然後如驅羣羊由將所指孰分竒正之别哉孫武所謂形人而我無形此乃竒正之極致是以素分者敎閲也臨時制變者不可勝窮也太宗曰深乎深乎曺公必知之矣但新書所以授諸將而已非竒正本法太宗曰曹公云竒兵旁擊卿謂若何靖曰臣按曹公註孫子曰先出合戰為正後出為竒此與旁擊之説異焉臣愚謂大衆所合為正將所自出為竒烏有先後旁擊之拘哉太宗曰吾之正使敵視以為竒吾之竒使敵視以為正斯所謂形人者歟以竒為正以正為竒變化莫測斯所謂無形者歟靖再拜曰陛下神聖迥出古人非人所及太宗曰分合為變者竒正安在靖曰善用兵者無不正無不竒使敵莫測故正亦勝竒亦勝三軍之士止知其勝莫知其所以勝非變而能通安能至是哉分合所出惟孫武能之呉起而下莫可及焉太宗曰呉術若何靖曰臣請畧言之魏武侯問呉起兩軍相向起曰使賤而勇者前擊鋒始交而北北而勿罰觀敵進取一坐一起奔北不追則敵有謀矣若悉衆追北行止縱横此敵人不才擊之勿疑臣謂呉術大率多類此非孫武所謂以正合也太宗曰卿舅韓擒虎嘗言卿可與論孫吴亦竒正之謂乎靖曰擒虎安知奇正之極但以竒為竒以正為正耳曾未知竒正相變循環無窮者也太宗曰古人臨陣出竒攻人不意斯亦相變之法乎靖曰前代戰鬭多是以小術而勝無術以片善而勝無善斯安足以論兵法也若謝𤣥之破苻堅非謝𤣥之善也乃苻堅之不善也太宗顧侍臣檢謝𤣥傳閲之曰苻堅甚處是不善靖曰臣觀苻堅載記曰秦諸軍皆潰敗惟慕容垂一軍獨全堅以千餘騎赴之垂子寳勸垂殺堅不果此有以見秦軍之亂慕容垂獨全葢堅為垂所陷明矣夫為人所陷而欲勝敵不亦難乎臣故曰無術焉苻堅之類是也太宗曰孫子謂多算勝少算少算勝無算凡事皆然太宗曰黄帝兵法世傳握竒文或謂為握機文何謂也靖曰竒音機故或傳為機其義則一考其辭云四為正四為竒餘竒為握機竒餘零也因此音機臣愚謂兵無不是機安在乎握而言也當為餘竒則是夫正兵受之於君竒兵將所自出法曰令素行以敎其民者則民服此受之於君者也又曰兵不豫言君命有不受此將所自出者也凡將正而無竒則守將也竒而無正則鬬將也竒正皆得國之輔也是故握機握竒本無二法在學者兼通而已太宗曰陣數有九中心零者大將握之四面八向皆取準焉陣間容陣隊間容隊以前為後以後為前進無速奔退無遽走四頭八尾觸處為首敵衝其中兩頭皆救數起于五而終于八此何謂也靖曰諸葛亮以石縱横布為八行方陣之法即此圖也臣嘗敎閲必先此陣世所傳握機文葢得其粗也太宗曰天地風雲龍虎鳥蛇斯八陣何義也靖曰傳之者誤也古人秘藏此法故詭設八名耳八陣本一也分為八焉若天地者本乎旗號風雲者本乎旛名龍虎鳥蛇者本乎隊伍之别後世誤傳詭設物象何止八而已乎太宗曰數起於五而終於八則非設象實古制也卿試陳之靖曰臣按黄帝始立丘井之法因以制兵故井分四道八家處之其形井字開方九焉五為陣法四為閒地此所謂數起于五也虚其中大將居之環其四面諸部連繞此所謂終于八也及乎變化制敵則紛紛紜紜鬭亂而法不亂混混沌沌形圓而勢不散此所謂散而成八復而為一者也太宗曰深乎黄帝之制兵也後世雖有天智神畧莫能出其閫閾降此孰有繼之者乎靖曰周之始興則太公實繕其法始於岐都以建井畆戎車三百兩虎賁三千人以立軍制六步七步六伐七伐以敎戰法陳師牧野太公以百夫制師以成武功以四萬五千人勝紂七十萬衆周司馬法本太公者也太公既沒齊人得其遺法至桓公霸天下任管仲復修太公法謂之節制之師諸侯畢服太宗曰儒者多言管仲霸臣而已殊不知兵法乃本於王制也諸葛亮王佐之才自比管樂以此知管仲亦王佐也但周衰時王不能用故假齊興師耳靖再拜曰陛下神聖知人如此老臣雖死無愧昔賢也臣請言管仲制齊之法三分齊國以為三軍五家為軌故五人為伍十軌為里故五十人為小戎四里為連故二百人為卒十連為鄉故二千人為旅五鄉為師故萬人為軍亦由司馬法一師五旅一旅五卒之義焉其實皆得太公之遺法太宗曰司馬法人言穰苴所述是歟否也靖曰按史記穰苴傳齊景公時穰苴善用兵敗燕晉之師景公尊為司馬之官由是稱司馬穰苴子孫號司馬氏至齊威王追論古司馬法又述穰苴所學遂有司馬穰苴書數十篇今世所傳兵家者流又分權謀形勢隂陽技巧四種皆出司馬法也太宗曰漢張良韓信序次兵法凡百八十二家刪取要用定著三十五家今失其傳何也靖曰張良所學太公六韜三畧是也韓信所學穰苴孫武是也然大體不出三門四種而已太宗曰何謂三門靖曰臣按太公謀八十一篇所謂隂謀不可以言窮太公言七十一篇不可以兵窮太公兵八十五篇不可以財窮此三門也太宗曰何謂四種靖曰漢任宏所論是也凡兵家流權謀為一種形勢為一種及隂陽技巧為二種此四種也太宗曰司馬法首序蒐狩何也靖曰順其時而要之以神重其事也周禮最為大政成有岐陽之蒐康有酆宮之朝穆有塗山之㑹此天子之事也及周衰齊桓有召陵之師晉文有踐土之盟此諸侯奉行天子之事也其實用九伐之法以威不恪假之以朝㑹因之以巡狩訓之以兵甲言無事兵不妄舉必於農隙不忘武備也故首序蒐狩不其深乎太宗曰春秋楚子二廣之法云百官象物而動軍政不戒而備此亦得周制歟靖曰按左氏説楚子乘廣二十乘廣有一卒卒偏之兩軍行右轅以轅為法故挟轅而戰皆周制也臣謂百人曰卒五十人曰兩此是每車一乘用士百五十人比周制差多耳周一乘步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人楚山澤之國車少而人多分為三隊則與周制同矣太宗曰春秋荀呉伐狄毁車為行亦正兵歟竒兵歟靖曰荀呉用車法耳雖舍車而法在其中焉一為左角一為右角一為前拒分為三隊此一乘法也千萬乘皆然臣按曹公新書云攻車七十五人前拒一隊左右角二隊守車一隊炊子十人守裝五人廐養五人樵汲五人共二十五人攻守二乘凡百人興兵十萬用車千乘輕重二千此大率荀呉之舊法也又觀漢魏之間軍制五車為隊僕射一人十車為師率長一人凡車十乘將吏二人多多倣此臣以今法參用之則跳盪騎兵也戰鋒隊步騎相半也駐隊兼車乘而出也臣西討突厥越險數千里此制未嘗敢易葢古法節制信可重也李衛公問對卷上
