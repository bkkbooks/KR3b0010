body:
  text: 李衛公問對卷中太宗幸靈州回召靖賜坐曰朕命道宗及阿史那社爾等討薛延陀而鐵勒諸部乞置漢官朕皆從其請延陀西走恐為後患故遣李績討之今北荒悉平然諸部番漢雜處以何道經久使得兩全安之靖曰陛下敕自突厥至回紇部落凡置驛六十六處以通斥堠斯已得策矣然臣愚以謂漢戌宜自為一法番落宜自為一法教習各異勿使混同或遇冦至則密敕主將臨時變號易服出竒擊之太宗曰何道也靖曰此所謂多方以誤之之術也番而示之漢漢而示之番彼不知番漢之别則莫能測我攻守之計矣善用兵者先為不可測則敵乖其所之也太宗曰正合朕意卿可密教邊將只以此番漢便見竒正之法矣靖再拜曰聖慮天縱聞一知十臣安能極其説哉太宗曰諸葛亮言有制之兵無能之將不可敗也無制之兵有能之將不可勝也朕疑此談非極致之論靖曰武侯有所激而云爾臣按孫子有曰教道不明吏卒無常陳兵縱橫曰亂自古亂軍引勝不可勝紀夫教道不明者言教閲無古法也吏卒無常者言將臣權任無久職也亂軍引勝者言已自潰敗非敵勝之也是以武侯言兵卒有制雖庸將難敗若兵卒自亂雖賢將危之又何疑焉太宗曰教閲之法信不可忽靖曰教得其道則士樂為用教不得法雖朝督暮責無益于事矣臣所以區區古制皆纂以圖者庶乎成有制之兵也太宗曰卿為我擇古陳法悉圖以上太宗曰番兵惟徑馬奔衝此竒兵歟漢兵惟強弩犄角此正兵歟靖曰按孫子云善用兵者求之於勢不責於人故能擇人而任勢夫所謂擇人者各隨番漢所長而戰也番長於馬馬利乎速鬬漢長於弩弩利乎緩戰此自然各任其勢也然非竒正所分臣前曾述番漢必變號易服者竒正相生之法也馬亦有正弩亦有竒何常之有哉太宗曰卿更細言其術靖曰先形之使敵從之是其術也太宗曰朕悟之矣孫子曰形兵之極至於無形又曰因形以措勝於衆衆不能知其此之謂乎靖再拜曰深乎陛下聖慮已思過半矣太宗曰近契丹奚皆內屬置松漠饒樂二都督統于安北都護朕用薛萬徹如何靖曰萬徹不如阿史那社爾及執失思力契苾何力此皆番臣之知兵者也臣嘗與之言松漠饒樂山川道路番情逆順逺至于西域部落十數種歷歷可信臣教之以陳法無不點頭服義望陛下任之勿疑若萬徹則勇而無謀難以獨任太宗笑曰番人皆為卿役使古人云以蠻夷攻蠻夷中國之勢也卿得之矣太宗曰朕觀諸兵書無出孫武孫武十三篇無出虛實夫用兵識虛實之勢則無不勝焉今諸將中但能言備實擊虛及其臨敵則鮮識虛實者蓋不能致人而反為敵所致故也如何卿悉為諸將言其要靖曰先教之以竒正相變之術然後語之以虛實之形可也諸將多不知以竒為正以正為竒且安識虛是實實是虛哉太宗曰策之而知得失之計作之而知動靜之理形之而知死生之地角之而知有餘不足之處此則竒正在我虛實在敵歟靖曰竒正者所以致敵之虛實也敵實則我必以正敵虛則我必以竒苟將不知竒正則雖知敵虛實安能致之哉臣奉詔但教諸將以竒正然後虛實自知焉太宗曰以竒為正者敵意其竒則吾正擊之以正為竒者敵意其正則吾竒擊之使敵勢常虛我勢常實當以此法授諸將使易曉耳靖曰千章萬句不出乎致人而不致於人而已臣當以此教諸將太宗曰朕置瑤池都督以𨽻安西都護番漢之兵如何處置靖曰天之生人本無番漢之别然地逺荒漠必以射獵為生由此常習戰鬬若我恩信撫之衣食周之則皆漢人矣陛下置此都護臣請收漢戍卒處之內地減省糧饋兵家所謂治力之法也但擇漢吏有熟番情者散守保障此足以經久或遇有警則漢卒出焉太宗曰孫子所言治力如何靖曰以近待逺以佚待勞以飽待飢此略言其槩耳善用兵者推此三義而有六焉以誘待來以靜待躁以重待輕以嚴待懈以治待亂以守待攻反是則力有弗逮非治力之術安能臨兵哉太宗曰今人習孫子者但誦空文鮮克推廣其義治力之法宜遍告諸將太宗曰舊將老卒凋零殆盡諸軍新置不經陳敵今教以何道為要靖曰臣嘗教士分為三等必先結伍法伍法既成授之軍校此一等也軍校之法以一為十以十為百此一等也授之裨將裨將乃總諸校之隊聚為陳圖此一等也大將察此三等之教於是大閲稽考制度分别竒正誓衆行罰陛下臨髙觀之無施不可太宗曰伍法有數家孰者為要靖曰臣按春秋左氏傳云先偏後伍又司馬法曰五人為伍尉繚子有束伍令漢制有尺籍伍符後世符籍以紙為之於是失其制矣臣酌其法自五人而變為二十五人自二十五人而變為七十五人此則步卒七十二人甲士三人之制也舍車用騎則二十五人當八馬此則五兵五當之制也是則諸家兵法惟伍法為要小列之五人大列之二十五人參列之七十五人又五參其數得三百七十五人三百人為正六十人為竒此則百五十人為分二正而三十人分為二竒蓋左右等也穰苴所謂五人為伍十伍為隊至今因之此其要也太宗曰朕與李績論兵法多同卿説但績不究出處爾卿所制六花陳法出何術乎靖曰臣所制本諸葛亮八陳法也大陳包小陳大營包小營隅落鈎連曲折相對古制如此臣為圖因之故外畫之方內環之圓是成六花俗為號爾太宗曰內圓外方何謂也靖曰方生于步圓生于竒方所以矩其步圓所以綴其旋是以步數定于地行綴應于天步定綴齊則變化不亂八陳為六武侯之舊法焉太宗曰畫方以見步點圓以見兵步教足法兵教手法手足便利思過半乎靖曰吳起云絶而不離却而不散此步法也教士猶布棋于盤若無畫路棋安用之孫子曰地生度度生量量生數數生稱稱生勝勝兵若以鎰稱銖敗兵若以銖稱鎰皆起於度量方圓也太宗曰深乎孫武之言不度地之逺近形之廣狹則何以制其節乎靖曰庸將罕能知其節者也善戰者其勢險其節短勢如彍弩節如發機臣修其術凡立隊相去各十步駐隊去師隊二十步每隔一隊立一戰隊前進以五十步為節角一聲諸隊皆散立不過十步之內至第四角聲籠鎗跪坐於是鼓之三呼三擊三十步至五十步以制敵之變馬軍從背出亦以五十步臨時節止前正後竒觀敵何如再鼓之則前竒後正復邀敵來伺隙搗虛此六花大率皆然也太宗曰曹公新書云作陳對敵必先立表引兵就表而陳一部受敵餘步不進救者斬此何術乎靖曰臨敵立表非也此但教戰時法耳古人善用兵者教正不教竒驅衆若驅羣羊與之進與之退不知所之也曹公驕而好勝當時諸將奉新書者莫敢攻其短且臨敵立表無乃晚乎臣竊觀陛下所製破陳樂舞前出四表後綴八幡左右折旋趨步金鼓各有其節此即八陳圖四頭八尾之制也人間但見樂舞之盛豈有知軍容如斯焉太宗曰昔漢髙帝定天下歌云安得猛士兮守四方蓋兵法可以意授不可以語傳朕為破陳樂舞惟卿已曉其表矣後世其知我不苟作也太宗曰方色五旗為正乎幡麾折衝為竒乎分合為變其隊數曷為得宜靖曰臣參用古法凡三隊合則旗相倚而不交五隊合則兩旗交十隊合則五旗交吹角開五交之旗則一復散而為十開二交之旗則一復散而為五開相倚不交之旗則一復散而為三兵散則以合為竒合則以散為竒三令五甲三散三合復歸于正四頭八尾乃可教焉此隊法所宜也太宗稱善太宗曰曹公有戰騎陷騎遊騎今馬軍何等比乎靖曰臣按新書云戰騎居前陷騎居中遊騎居後如此則是各立名號分為三類爾大抵騎隊八馬當車徒二十四人二十四騎當車徒七十二人此古制也車徒當教以正騎隊當教以竒據曹公前後及中分為三覆不言兩廂舉一端言也後人不曉三覆之義則戰騎必前於陷騎遊騎如何使用臣熟用此法回軍轉陳則逰騎當前戰騎當後陷騎臨變而分皆曹公之術也太宗笑曰多少人為曹公所惑太宗曰車步騎三者一法也其用在人乎靖曰臣按春秋魚麗陳先遍後伍此則車步無騎謂之左右拒言拒禦而已非取出竒制勝也晉荀吳伐狄舍車而行此則騎多為便惟務竒勝非拒禦而已臣均其術一馬當三人車步稱之混為一法用之在人敵安知吾車果何出騎果何來徒果何從哉或潛九地或動九天其知如神惟陛下有焉臣何足以知之太宗曰太公書云地方六百步或六十步表十二辰其術如何靖曰畫地方一千二百步開方之形也每部占地二十步之方橫以五步立一人縱以四步立一人凡二千五百人分五方空地四處所謂陳間容陳者也武王伐紂虎賁各掌三千人每陳六千人共三萬之衆此太公畫地之法也太宗曰卿六花陳畫地幾何靖曰大閲地方千二百步者其義六陳各占地四百步分為東西兩廂空地一千二百步為教戰之所臣嘗教士三萬每陳五千人以其一為營法五為方圓曲直鋭之形每陳五變凡二十五變而止太宗曰五行陳如何靖曰本因五方色立此名方圓曲直鋭實因地形使然凡軍不素習此五者安可以臨敵乎兵詭道也故強名五行焉文之以術數相生相剋之義其實兵形象水因地制流此其旨也太宗曰李績言牝牡方圓伏兵法古有是否靖曰牝牡之法出於俗傳其實隂陽二義而已臣按范蠡云後則用隂先則用陽盡敵陽節盈吾隂節而奪之此兵家隂陽之妙也范蠡又云設右為牝益左為牡早晏以順天道此則左右早晏臨時不同在乎奇正之變者也左右者人之隂陽早晏者天之隂陽竒正者天人相變之隂陽若執而不變則隂陽俱廢如何守牝牡之形而已故形之者以竒示敵非吾正也勝之者以正擊敵非吾竒也此謂竒正相變兵伏者不止山谷草木伏藏所以為伏也其正如山其竒如雷敵雖對面莫測吾竒正所在至此夫何形之有哉太宗曰四獸之陳又以商羽徴角象之何道也靖曰詭道也太宗曰可廢乎靖曰存之所以能廢之也若廢而不用詭愈甚焉太宗曰何謂也靖曰假之以四獸之陳及天地風雲之號又加商金羽水徴火角木之配此皆兵家自古詭道存之則餘詭不復增矣廢之則使貪使愚之術從何而施哉太宗良久曰卿宜祕之無泄于外李衛公問對卷中
