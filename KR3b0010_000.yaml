body:
  text: 李衛公問對兵家類提要臣等謹案李衛公問對三卷唐司徒并州都督衛國景武公李靖所對太宗問兵事而後人錄以成書者也靖少為其舅韓擒虎所知謂孫呉不是過卒為唐初名將史稱所著兵法世無完書惟通典中畧見大概此書出於宋初大抵因杜氏所有者而附益之何薳春渚紀聞謂蘇軾嘗言世傳王通元經闗子明易傳及此書皆阮逸所偽撰蘇洵曾見其草本馬端臨據四朝國史兵志謂神宗熈寧間嘗詔樞宻院校正此書似非逸所假托胡應麟筆叢則又稱其詞㫖淺陋猥俗最無足采阮逸亦不應鄙野至此當是唐末宋初村儒俚學掇拾貞觀君臣遺事而為之諸説紛紜多不相合其果岀阮逸與否固未可定而非靖所自著則絶無可疑特其所言分别竒正指畫攻守變易主客於兵家術法頗見詳盡亦不至遂如胡應麟所詆鄭瑗謂問對之書雖偽然必出於有學識謀畧者之手斯言較為得之惟宋代遽立之學官使與孫呉並稱襍然無别斯則不免失於詳考耳世所行本不分卷數今依文獻通考定為三卷仍著之於錄以備兵書之一種焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:46c473b24cfe00d763db5c122dea5c4b298d957ee845546c18cd4d903621dd72
