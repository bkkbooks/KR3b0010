body:
  text: 李衛公問對兵家類提要臣等謹案李衛公問對三卷唐司徒并州都督衛國景武公李靖所對太宗問兵事而後人録以成書者也靖少為其舅韓擒虎所知謂孫吳不是過卒為唐初名將史稱所著兵法世無完書惟通典中略見大概此書出於宋初大抵因杜氏所有者而附益之何薳春渚紀聞謂蘇軾嘗言世傳王通元經關子明易傳及此書皆阮逸所僞撰蘇洵曾見其草本馬端臨據四朝國史兵志謂神宗熙寧間嘗詔樞密院校正此書似非逸所假托胡應麟筆叢則又稱其詞㫖淺陋猥俗最無足采阮逸亦不應鄙野至此當是唐末宋初村儒俚學掇拾貞觀君臣遺事而為之諸說紛紜多不相合其果出阮逸與否固未可定而非靖所自著則絶無可疑特其所言分别竒正指畫攻守變易主客於兵家術法頗見詳盡亦不至遂如胡應麟所詆鄭瑗謂問對之書雖僞然必出於有學識謀略者之手斯言較為得之惟宋代遽立之學官使與孫吳並稱雜然無别斯則不免失於詳考耳世所行本不分卷數今依文獻通考定為三卷仍著之於録以備兵書之一種焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fdcf3e61a74a4b46d87ec85cef62db09b4fcaf5d330d430ad0fb5ee8efd3b66a
